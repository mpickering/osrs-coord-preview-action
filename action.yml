name: OSRS Coordinate Preview
description: Render OSRS coordinate previews in CI and optionally comment on pull requests.
author: mpickering
branding:
  icon: map
  color: blue
inputs:
  coordinates:
    description: JSON array of objects containing coordinate, plus optional id, label, and source fields. Takes precedence over coordinates-file when both are set.
    required: false
  coordinates-file:
    description: Path to a file containing the JSON array payload for coordinates.
    required: false
  comment:
    description: Post or update a pull request comment summarizing the rendered previews.
    required: false
    default: "false"
  pr-number:
    description: Pull request number to comment on. When omitted, the comment action uses the current pull request context.
    required: false
  renderer-url:
    description: Full URL of the remote render endpoint.
    required: false
    default: https://osrs-coordinate-preview-nt7ywvsdgq-nw.a.run.app/render
  github-token:
    description: GitHub token used for optional pull request commenting. Defaults to github.token when omitted.
    required: false
  output-dir:
    description: Directory where the local manifest and markdown outputs are written.
    required: false
    default: .osrs-coordinate-preview
outputs:
  manifest_path:
    description: Path to the generated manifest.json file.
    value: ${{ steps.render.outputs.manifest_path }}
  comment_body_path:
    description: Path to the generated comment markdown file.
    value: ${{ steps.render.outputs.comment_body_path }}
  summary_path:
    description: Path to the generated summary markdown file.
    value: ${{ steps.render.outputs.summary_path }}
  render_count:
    description: Number of successfully rendered previews.
    value: ${{ steps.render.outputs.render_count }}
  failed_count:
    description: Number of failed preview renders.
    value: ${{ steps.render.outputs.failed_count }}
runs:
  using: composite
  steps:
    - id: render
      # Direct invocation avoids relying on nested local-action resolution.
      # If GitHub ships the proposed same-repo same-SHA "$/" syntax, this can
      # become a nested action reference instead:
      # https://github.com/orgs/community/discussions/26245
      # uses: $/render
      shell: bash
      run: node "$GITHUB_ACTION_PATH/dist/index.js"
      env:
        OSRS_COORDINATES: ${{ inputs.coordinates }}
        OSRS_COORDINATES_FILE: ${{ inputs.coordinates-file }}
        OSRS_RENDERER_URL: ${{ inputs.renderer-url }}
        OSRS_OUTPUT_DIR: ${{ inputs.output-dir }}
    - if: ${{ inputs.comment == 'true' }}
      uses: thollander/actions-comment-pull-request@v3
      with:
        github-token: ${{ inputs.github-token || github.token }}
        file-path: ${{ steps.render.outputs.comment_body_path }}
        pr-number: ${{ inputs.pr-number }}
        comment-tag: osrs-coordinate-preview
